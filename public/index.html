<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>畅途客运 - 长途汽车票在线订购</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="navbar">
    <a class="brand" href="/">畅途客运<span>长途汽车票</span></a>
    <nav id="nav"></nav>
  </div>

  <div class="container">
    <div class="card">
      <h1>班次查询</h1>
      <div class="search-bar">
        <div>
          <label>出发城市</label>
          <select id="fromCity"><option value="">不限</option></select>
        </div>
        <div>
          <label>到达城市</label>
          <select id="toCity"><option value="">不限</option></select>
        </div>
        <div>
          <label>出发日期</label>
          <input type="date" id="departDate" />
        </div>
        <div>
          <button class="btn" id="searchBtn">查询</button>
        </div>
      </div>
    </div>

    <div id="msg" class="msg" style="display:none"></div>
    <div id="results"></div>
  </div>

  <!-- 购票弹窗 -->
  <div class="modal-backdrop" id="bookModal">
    <div class="modal">
      <h2>确认购票</h2>
      <div id="bookInfo" class="mt"></div>
      <div class="form-row mt">
        <label>乘客姓名</label>
        <input type="text" id="passenger" placeholder="请输入乘客姓名" />
      </div>
      <div class="form-row">
        <label>购买座位数（1-5）</label>
        <input type="number" id="seatCount" value="1" min="1" max="5" />
      </div>
      <div id="bookMsg" class="msg" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="bookCancel">取消</button>
        <button class="btn" id="bookConfirm">确认下单</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
