<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 畅途客运</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="navbar">
    <a class="brand" href="/">畅途客运<span>长途汽车票</span></a>
    <nav><a href="/login.html">登录</a></nav>
  </div>

  <div class="container container-narrow">
    <div class="card">
      <h1>用户注册</h1>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="form-row">
        <label>用户名（至少3位）</label>
        <input type="text" id="username" placeholder="用户名" />
      </div>
      <div class="form-row">
        <label>密码（至少6位）</label>
        <input type="password" id="password" placeholder="密码" />
      </div>
      <div class="form-row">
        <label>手机号（选填）</label>
        <input type="text" id="phone" placeholder="手机号" />
      </div>
      <button class="btn" id="regBtn" style="width:100%">注册</button>
      <p class="mt muted center">已有账号？<a href="/login.html">去登录</a></p>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const msgEl = document.getElementById('msg');
    if (Auth.isLoggedIn) location.href = '/';
    document.getElementById('regBtn').onclick = async () => {
      clearFlash(msgEl);
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value.trim();
      if (!username || !password) return flash(msgEl, '请输入用户名和密码');
      try {
        const { token, user } = await api('/auth/register', {
          method: 'POST', auth: false, body: { username, password, phone },
        });
        Auth.set(token, user);
        flash(msgEl, '注册成功，正在跳转...', 'success');
        setTimeout(() => (location.href = '/'), 800);
      } catch (e) { flash(msgEl, e.message); }
    };
  </script>
</body>
</html>
