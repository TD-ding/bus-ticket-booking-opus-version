<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 畅途客运</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="navbar">
    <a class="brand" href="/">畅途客运<span>长途汽车票</span></a>
    <nav><a href="/register.html">注册</a></nav>
  </div>

  <div class="container container-narrow">
    <div class="card">
      <h1>用户登录</h1>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="form-row">
        <label>用户名</label>
        <input type="text" id="username" placeholder="用户名" />
      </div>
      <div class="form-row">
        <label>密码</label>
        <input type="password" id="password" placeholder="密码" />
      </div>
      <button class="btn" id="loginBtn" style="width:100%">登录</button>
      <p class="mt muted center">还没有账号？<a href="/register.html">立即注册</a></p>
      <p class="muted center" style="font-size:12px;margin-top:8px">
        演示账号：admin/admin123 或 zhangsan/user123
      </p>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const msgEl = document.getElementById('msg');
    if (Auth.isLoggedIn) location.href = '/';
    document.getElementById('loginBtn').onclick = async () => {
      clearFlash(msgEl);
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return flash(msgEl, '请输入用户名和密码');
      try {
        const { token, user } = await api('/auth/login', {
          method: 'POST', auth: false, body: { username, password },
        });
        Auth.set(token, user);
        location.href = user.role === 'admin' ? '/admin/' : '/';
      } catch (e) { flash(msgEl, e.message); }
    };
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
